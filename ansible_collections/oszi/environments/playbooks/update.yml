---
- name: Update system and python packages, ACME certificates
  hosts: "{{ [baselinux_hosts | default('all'),
    containerhost_hosts | default('containerhosts'),
    toolbox_hosts | default('toolbox*'),
    workstation_hosts | default('workstations')] | flatten }}"
  become: true
  gather_facts: false
  pre_tasks:
    - name: Import bootstrap tasks
      ansible.builtin.import_role:
        name: oszi.utils.bootstrap
        tasks_from: bootstrap
      tags: [always]

  tasks:
    - name: Import updates for distribution packages
      ansible.builtin.import_role:
        name: oszi.general.package_manager
        tasks_from: update

    - name: Import updates for python packages
      ansible.builtin.import_role:
        name: oszi.general.python
        tasks_from: update

    - name: Import updates for ACME certificates
      ansible.builtin.import_role:
        name: oszi.general.acme
        tasks_from: update

- name: Update podman images
  hosts: "{{ [containerhost_hosts | default('containerhosts'),
    workstation_hosts | default('workstations')] | flatten }}"
  become: true
  gather_facts: false
  tasks:
    - name: Podman update tasks
      when: "not podman_disabled | default(false)"
      tags: [podman]
      block:
        - name: Include updates for podman images as root
          ansible.builtin.include_role:
            name: oszi.general.podman
            tasks_from: update

        - name: Check if unprivileged user namespaces are enabled
          when: "ansible_user | default('root') != 'root'"
          ansible.builtin.shell: |
            set -euo pipefail
            sysctl -n kernel.unprivileged_userns_clone 2>/dev/null \
              || sysctl -n user.max_user_namespaces
          args:
            executable: "/bin/bash"
          register: _sysctl_userns_result
          check_mode: false
          changed_when: false
          failed_when: false

        - name: Include updates for podman images as ansible_user
          when: "_sysctl_userns_result is defined and _sysctl_userns_result.stdout | default(0) | int > 0"
          ansible.builtin.include_role:
            name: oszi.general.podman
            tasks_from: update
            apply:
              become: false

- name: Update flatpak and snap packages
  hosts: "{{ workstation_hosts | default('workstations') }}"
  become: true
  gather_facts: false
  tasks:
    - name: Import updates for flatpak packages
      ansible.builtin.import_role:
        name: oszi.general.flatpak
        tasks_from: update

    - name: Import updates for snap packages
      ansible.builtin.import_role:
        name: oszi.general.snap
        tasks_from: update
