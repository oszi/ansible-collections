---
argument_specs:
  main:
    short_description: GNOME user-specific configuration management
    description:
      - Manages per-user GNOME settings via dconf database
      - Configures XDG user directories (Documents, Downloads, Pictures, etc.)
      - Sets up custom keyboard shortcuts and keybindings
      - Manages GNOME desktop preferences including themes, fonts, and behavior
    author:
      - oszi
    options:
      gnome_users:
        description:
          - List of usernames to configure GNOME settings for
          - Uses become to switch user context if different from ansible_user
          - Defaults to ansible_user for workstations (excludes root)
        type: list
        elements: str
        required: false
        default: "{{ [ansible_user] if ansible_user | default('root') != 'root' and 'workstations' in group_names else [] }}"

      gnome_users_screenshots_path:
        description:
          - Override directory for GNOME Screenshots and Screencasts
          - When set, creates symlinks from default locations to XDG Pictures/Videos directories
          - Allows customizing where screenshots and screencasts are saved
        type: str
        required: false

      gnome_users_dconf_custom_keybindings:
        description:
          - Dictionary of custom keyboard shortcuts with friendly names
          - Each key is a shortcut ID, value is a dict with binding, command, and name
          - Do not set custom keybindings in gnome_users_dconf_vars directly
        type: dict
        required: false
        options:
          binding:
            description: Key combination in GTK format (e.g., '<Alt>Above_Tab')
            type: str
            required: true
          command:
            description: Shell command to execute when shortcut is triggered
            type: str
            required: true
          name:
            description: Human-readable name for the keyboard shortcut
            type: str
            required: true

      gnome_users_dconf_vars:
        description:
          - Dictionary of dconf settings to apply for each user
          - Keys are dconf paths, values are dconf values in GVariant format
          - String values must be quoted like "'myvalue'" due to GVariant syntax
          - Defaults to comprehensive keyboard shortcuts and desktop preferences
        type: dict
        required: false
        default: "{{ gnome_users_dconf_vars_default }}"

      gnome_users_dconf_vars_default:
        description:
          - Default dconf configuration including keyboard shortcuts, themes, and preferences
          - Configures input sources, window management keybindings, screenshot shortcuts
          - Sets desktop interface preferences including fonts, themes, and clock format
        type: dict
        required: false

      gnome_users_xdg_user_dirs:
        description:
          - XDG user directories configuration (shell-escaped, homedir-relative paths)
          - Defines standard directories like Desktop, Downloads, Documents, Pictures, Videos
          - Values should be shell-escaped paths relative to $HOME
        type: dict
        required: false
        default:
          desktop: "$HOME/Desktop"
          download: "$HOME/Downloads"
          templates: "$HOME/Templates"
          publicshare: "$HOME/Public"
          documents: "$HOME/Documents"
          music: "$HOME/Music"
          pictures: "$HOME/Pictures"
          videos: "$HOME/Videos"

      gnome_users_xdg_user_dirs_locale:
        description:
          - Locale for XDG user directory naming
          - Controls the language used for directory names
        type: str
        required: false
        default: "en_US"
