---
galaxy_info:
  description: "ACME certificate management with DNS01 challenge validation."
  author: "David O. (oszi.dev)"
  license: "BSD-3-Clause"
  min_ansible_version: "2.20.0"

  platforms:
    - name: Fedora
      versions: [all]
    - name: EL
      versions: [all]
    - name: Debian
      versions: [all]
    - name: Ubuntu
      versions: [all]

  galaxy_tags:
    - general
    - rootless
    - baselinux

dependencies:
  - role: oszi.utils.facts
  # Gather network facts only for inventory references.
  - role: oszi.utils.facts
    vars:
      facts_subset: [network]
