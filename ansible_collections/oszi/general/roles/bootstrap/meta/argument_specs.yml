---
argument_specs:
  main:
    short_description: Bootstrap role for initial host configuration and fact gathering
    description:
      - Performs initial host bootstrap including SSH port detection and fallback
      - Gathers system facts with configurable subset filtering
      - Validates system requirements with assertions
      - Updates package manager cache for supported distributions
    author:
      - oszi
    options:
      bootstrap_ssh_port_fallback:
        description:
          - Fallback SSH port to try if ansible_port is unreachable
          - Set to zero (or ansible_port) to disable SSH port fallback
          - Should be used with persistent fact caching disabled initially
        type: int
        required: false
        default: 22

      bootstrap_facts_gather_subset:
        description:
          - List of fact subsets to gather using ansible.builtin.setup module
          - Controls which system information is collected during bootstrapping
        type: list
        elements: str
        required: false
        default:
          - all

      bootstrap_assert_that:
        description:
          - List of assertion rules for ansible.builtin.assert to validate system requirements
          - Should contain literal assertion strings without interpolation
          - Default validates OS family is either Debian or RedHat
        type: list
        elements: str
        required: false
        default:
          - "ansible_facts.os_family in ['Debian', 'RedHat']"

      ## XXX: This cannot be validated as we gather facts after argument checks.
      # bootstrap_package_update_cache:
      #   description:
      #     - Whether to update the default package manager cache after fact gathering
      #     - Useful to avoid specifying cache_valid_time in apt package tasks
      #     - Only applies when running as root with apt package manager
      #   type: bool
      #   required: false
      #   default: "{{ ansible_facts.pkg_mgr == 'apt' and ansible_facts.user_uid | int == 0 }}"

      bootstrap_apt_cache_valid_time:
        description:
          - Cache validity time in seconds for apt package manager
          - Determines how old the cache can be before updating
        type: int
        required: false
        default: 86400
