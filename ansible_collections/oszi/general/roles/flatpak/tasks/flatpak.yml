---
- name: Ensure flatpak remotes are installed
  community.general.flatpak_remote:
    name: "{{ item.key }}"
    flatpakrepo_url: "{{ item.value }}"
    method: "{{ flatpak_method }}"
    state: "present"
  with_dict: "{{ flatpak_remotes }}"

- name: Ensure flatpak apps are installed
  community.general.flatpak:
    name: "{{ item.key }}"
    remote: "{{ item.value }}"
    method: "{{ flatpak_method }}"
    state: "present"
  with_dict: "{{ flatpak_apps }}"

- name: Ensure blacklisted flatpak apps are not installed
  community.general.flatpak:
    name: "{{ item }}"
    method: "{{ flatpak_method }}"
    state: "absent"
  with_items: "{{ flatpak_blacklisted_apps }}"

- name: Ensure app flatpak overrides are set
  ansible.builtin.command: >-
    flatpak override --{{ flatpak_method }} {% for option in item.value
    %} {{ option | quote }} {% endfor %} {{ item.key | quote }}
  with_dict: "{{ flatpak_app_overrides }}"
  changed_when: false

- name: Ensure global flatpak overrides are set
  ansible.builtin.command: >-
    flatpak override --{{ flatpak_method }} {% for option in flatpak_global_overrides
    %} {{ option | quote }} {% endfor %}
  changed_when: false

# When oszi.general.shell is also included alongside of this role.
- name: Install shell aliases for flatpak apps
  when: shell_shrc_d_export_path is defined and shell_shrc_d_export_path is truthy
  ansible.builtin.template:
    src: "etc/shrc.d/flatpak-aliases.sh.j2"
    dest: "{{ shell_shrc_d_export_path }}/flatpak-aliases.sh"
    owner: "root"
    group: "root"
    mode: "0644"
