---
argument_specs:
  main:
    short_description: OpenSSH server configuration and key management
    description:
      - Manages OpenSSH server installation and configuration
      - Configures authorized keys for SSH access
      - Supports SSH crypto hardening and host key selection
      - Allows user-based access control and custom sshd_config settings
    author:
      - "David O. (oszi.dev)"
    options:
      ssh_server_disabled:
        description:
          - Whether to disable and uninstall OpenSSH server
          - Disabled by default for containers
        type: bool
        required: false

      ssh_server_config_overridable:
        description:
          - Whether to override the distribution-provided sshd_config
          - When true, the role manages /etc/ssh/sshd_config, set to false to only manage authorized keys
        type: bool
        required: false
        default: true

      ssh_auth_methods:
        description:
          - Space-separated list of one or more comma-separated authentication methods that must be successfully completed
            for a user to be granted access; authentication requires completion of exactly one complete AND-logic method listed
          - Known authentication methods - `publickey` `password` `hostbased` `keyboard-interactive` `none`
          - For example, `publickey,password publickey,keyboard-interactive`, `publickey,publickey` to require two different public keys
        type: str
        required: false
        default: publickey

      ssh_allow_users:
        description:
          - List of usernames allowed to connect via SSH
          - When set, generates AllowUsers directive in sshd_config
        type: list
        elements: str
        required: false

      ssh_authorized_keys:
        description:
          - Dictionary of authorized SSH keys by username
          - Keys are usernames, values are SSH public keys (multiple keys can be separated by newlines)
          - |-
            Advanced example with multiple keys and restrictions:
            ```yaml
            ssh_authorized_keys:
              mobile: |-
                from="0.0.0.0/0",restrict,pty ssh-ed25519 AAAA... mobile-biometric
                from="0.0.0.0/0",restrict,command="{{ ssh_sftp_subsystem }}" ssh-ed25519 AAAA... mobile-sftp-only
            ```
        type: dict
        required: false

      ssh_authorized_keys_exclusive:
        description:
          - Whether to remove authorized keys that were not configured here
          - When true, only keys specified in ssh_authorized_keys are allowed
        type: bool
        required: false
        default: true

      ssh_authorized_keys_immutable:
        description:
          - Whether to make authorized_keys files immutable to protect restrictions
          - Note - Without making ~/.ssh append-only (+a) this can still be worked around
          - Making ~/.ssh append-only breaks some legitimate use cases like cleaning up control sockets
        type: bool
        required: false
        default: false

      ssh_harden_crypto:
        description:
          - Whether to harden SSH cryptographic settings
          - Restricts to strong ciphers, MACs, and key exchange algorithms
        type: bool
        required: false
        default: true

      ssh_host_keys:
        description:
          - List of SSH host key file paths to configure (defaults to Ed25519 and RSA)
          - Only listed host keys will be active on the server
        type: list
        elements: path
        required: false

      ssh_server_config_extra:
        description:
          - Extra configuration lines to append to sshd_config
          - Use for additional SSH server settings not covered by role defaults
        type: str
        required: false
