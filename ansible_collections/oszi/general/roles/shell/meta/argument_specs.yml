---
argument_specs:
  main:
    short_description: Shell environment and configuration management
    description:
      - Configures system-wide shell settings for bash and zsh
      - Manages shell history, environment variables, and PATH
      - Installs essential shell tools and utilities
      - Enforces skeleton files for consistent user shell environments
    author:
      - oszi
    options:
      shell_disabled:
        description:
          - Whether to skip shell setup tasks
          - Useful for read-only systems or immutable environments
        type: bool
        required: false
        default: false

      shell_histsize:
        description:
          - Number of commands to keep in shell history in memory
          - Applied system-wide via /etc/profile.d/
        type: int
        required: false
        default: 10000

      shell_histfilesize:
        description:
          - Number of commands to keep in shell history file on disk
          - Applied system-wide via /etc/profile.d/
        type: int
        required: false
        default: 10000

      shell_environment:
        description:
          - Dictionary of environment variables to set system-wide
          - If EDITOR or VISUAL is vi, ZSH switches to vi key-bindings
        type: dict
        required: false
        default:
          ENV: /etc/shrc
          EDITOR: nano

      shell_search_paths:
        description:
          - List of additional paths to add to $PATH environment variable
          - Paths should be escaped for shell safety (e.g., '"$HOME"/.local/bin')
        type: list
        elements: str
        required: false
        default:
          - '"$HOME"/.local/bin'
          - '"$HOME"/bin'

      shell_skeleton_enforced_users:
        description:
          - List of usernames to enforce /etc/skel/.bashrc and other skeleton files for
          - Ensures consistent shell configuration across specified users
        type: list
        elements: str
        required: false
        default: "{{ (['root', ansible_user | default('root')] + (users_users.keys() | list if users_users is defined else [])) | unique }}"

      shell_packages:
        description:
          - Nested list of shell and essential utility packages to install
          - Includes bash, zsh, bash-completion, and common CLI tools
        type: list
        elements: raw
        required: false

      shell_local_bin_path:
        description:
          - Directory path for local shell scripts and executables
        type: str
        required: false
        default: "{{ local_bin_path | default('/usr/local/bin', true) }}"

      shell_bash_completions_for_zsh:
        description:
          - Dictionary of ZSH-compatible bash completion files to pre-load
          - Keys are command names, values are paths or lists of paths to completion files
          - Used when native ZSH completion (_key) does not exist
          - Most bash completions are not ZSH-compatible, use selectively
        type: dict
        required: false
