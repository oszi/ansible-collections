---
- name: Shell configuration tasks
  tags: [shell]
  block:
    # Do not mix privilege levels in playbooks - shell_shrc_d_path is rootless aware!
    - name: Export shell_shrc_d_export_path fact for integrations
      ansible.builtin.set_fact:
        shell_shrc_d_export_path: "{{ shell_shrc_d_path if not shell_disabled else none }}"
        cacheable: true  # Persists through all plays.
      tags: [always]

    - name: Include shell configuration tasks
      when: not shell_disabled
      ansible.builtin.include_tasks:
        file: shell.yml

    - name: Include tasks to enforce skeleton config files
      when: not shell_disabled
      ansible.builtin.include_tasks:
        file: skel-user.yml
      loop: "{{ shell_skeleton_enforced_users | unique }}"
      loop_control:
        loop_var: _shell_user_item_var  # use as shell_user_item

    - name: Shell role completed
      ansible.builtin.assert:
        that: true
        quiet: true
