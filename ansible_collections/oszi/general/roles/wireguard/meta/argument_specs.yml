---
argument_specs:
  main:
    short_description: WireGuard VPN configuration management
    description:
      - Manages WireGuard VPN tunnel configurations using wg-quick
      - Configures WireGuard interfaces with systemd service integration
      - Supports multiple VPN tunnels with separate configuration files
      - Alternative suggestion to use systemd-networkd instead of wg-quick
    author:
      - oszi
    options:
      wireguard_disabled:
        description:
          - Whether to skip configuration of WireGuard tools
        type: bool
        required: false
        default: false

      wireguard_quick_configs:
        description:
          - Dictionary of WireGuard configuration files for wg-quick
          - Keys are interface names, values are wg-quick configuration file contents
          - See https://git.zx2c4.com/WireGuard/about/src/tools/man/wg-quick.8
        type: dict
        required: false
        default: {}

      wireguard_quick_services:
        description:
          - List of interface names to enable wg-quick@%i.service for
          - Services are started and enabled at boot
          - Automatically includes all keys from wireguard_quick_configs (except for containers)
        type: list
        elements: str
        required: false
        default: "{{ wireguard_quick_configs.keys() | list if ansible_facts.virtualization_type != 'container' else [] }}"

      wireguard_packages:
        description:
          - List of WireGuard packages to install (tools and kernel module for kernels <5.6)
          - Package name differs between RedHat (wireguard-tools) and Debian (wireguard)
        type: list
        elements: str
        required: false
