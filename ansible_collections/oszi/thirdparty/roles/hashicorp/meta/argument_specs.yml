---
argument_specs:
  main:
    short_description: HashiCorp product repository and package management
    description:
      - Configures HashiCorp official package repositories
      - Manages installation and removal of HashiCorp products
      - Supports Terraform, Vault, Consul, Nomad, Packer, and other HashiCorp tools
    author:
      - oszi
    options:
      hashicorp_enabled:
        description:
          - Whether to install the HashiCorp repository and packages
          - Disabled by default
        type: bool
        required: false
        default: false

      hashicorp_packages:
        description:
          - List of HashiCorp package names to install
          - Available packages are restricted by hashicorp_includepkgs in vars/main.yml
        type: list
        elements: str
        required: false
        default: []

      hashicorp_blacklisted_packages:
        description:
          - List of HashiCorp package names to remove
        type: list
        elements: str
        required: false
        default: []

      hashicorp_rpm_baseurl:
        description:
          - Base URL for the HashiCorp RPM repository
          - Automatically selects between Fedora and RHEL repositories
          - Change for custom mirrors or proxies
        type: str
        required: false
        default: "https://rpm.releases.hashicorp.com/{{ (ansible_facts.distribution == 'Fedora') | ternary('fedora', 'RHEL') }}/$releasever/$basearch"

      hashicorp_deb_baseurl:
        description:
          - Base URL for the HashiCorp Debian/Ubuntu repository
          - Change for custom mirrors or proxies
        type: str
        required: false
        default: "https://apt.releases.hashicorp.com"
