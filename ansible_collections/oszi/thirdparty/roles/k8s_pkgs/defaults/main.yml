---
# Install the Kubernetes community repository: pkgs.k8s.io? (Off by default!)
k8s_pkgs_enabled: false

# List of Kubernetes community packages to install:
k8s_pkgs_packages: []

# Main version of the Kubernetes community package repository
# Only used in the defaults below
k8s_pkgs_version: "v1.36"

# Repo base URLs - change for custom mirrors
k8s_pkgs_rpm_baseurl: "https://pkgs.k8s.io/core:/stable:/{{ k8s_pkgs_version }}/rpm/"
k8s_pkgs_deb_baseurl: "https://pkgs.k8s.io/core:/stable:/{{ k8s_pkgs_version }}/deb/"

# GPG public key URLs - change for custom mirrors
k8s_pkgs_rpm_gpgkey_url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_pkgs_version }}/rpm/repodata/repomd.xml.key"
k8s_pkgs_deb_gpgkey_url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_pkgs_version }}/deb/Release.key"

# Optional checksums (algo:hash) for GPG public key downloads
k8s_pkgs_rpm_gpgkey_checksum: ""
k8s_pkgs_deb_gpgkey_checksum: ""

# System completion paths for Bash and ZSH:
k8s_pkgs_kubectl_bash_completion_path: "/etc/bash_completion.d/kubectl"
k8s_pkgs_kubectl_zsh_completion_path: "/usr/local/share/zsh/site-functions/_kubectl"
k8s_pkgs_kubeadm_bash_completion_path: "/etc/bash_completion.d/kubeadm"
k8s_pkgs_kubeadm_zsh_completion_path: "{{ [shell_shrc_d_export_path, 'kubeadm-completion.zsh'] | path_join
  if shell_shrc_d_export_path | default(none) is truthy else '' }}"  # kubeadm is not ZSH-native.
