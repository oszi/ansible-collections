---
k8s_pkgs_rpm_gpgkey: "/etc/pki/rpm-gpg/RPM-GPG-KEY-kubernetes"
k8s_pkgs_rpm_repo_path: "/etc/yum.repos.d/kubernetes.repo"
k8s_pkgs_rpm_includepkgs:
  - "kube*"
  - "cri-tools"

k8s_pkgs_deb_gpgkey: "/etc/apt/keyrings/kubernetes-apt-keyring.gpg"
k8s_pkgs_deb_repo_path: "/etc/apt/sources.list.d/kubernetes.list"
k8s_pkgs_deb_repo: >-
  deb [signed-by={{ k8s_pkgs_deb_gpgkey }}] {{ k8s_pkgs_deb_baseurl }} /
