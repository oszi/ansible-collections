---
- name: Install kubeadm completion for bash
  when: k8s_pkgs_kubeadm_enabled and k8s_pkgs_kubeadm_bash_completion_path is truthy
  block:
    - name: Ensure completion path for bash exists
      ansible.builtin.file:
        path: "{{ k8s_pkgs_kubeadm_bash_completion_path | dirname }}"
        state: "directory"
        mode: "0755"

    - name: Generate kubeadm completion for bash
      ansible.builtin.command: "kubeadm completion bash"
      register: _k8s_pkgs_kubeadm_completion_bash_result
      changed_when: false
      check_mode: false
      no_log: true

    - name: Copy kubeadm completion for bash
      ansible.builtin.copy:
        dest: "{{ k8s_pkgs_kubeadm_bash_completion_path }}"
        content: "{{ _k8s_pkgs_kubeadm_completion_bash_result.stdout }}"
        owner: "root"
        group: "root"
        mode: "0644"

